# DS19 — Week 9 Full Stack docker-compose
# 8 Services:
#   1. app         — FastAPI recommendation API
#   2. redis       — Redis (cache + bandit state + rate limiting)
#   3. mlflow      — MLflow tracking server
#   4. prometheus  — Metrics collection
#   5. grafana     — Dashboards + alerts
#   6. frontend    — React app (built + served by Nginx)
#   7. nginx       — Reverse proxy (frontend + API routing)
#   8. celery      — Background worker (optional: bandit state sync)

version: "3.9"

networks:
  ds19_net:
    driver: bridge

volumes:
  redis_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

services:

  # ── SERVICE 1: FastAPI Application ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ds19_app
    ports:
      - "8000:8000"
    environment:
      - ENV=prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - FEAST_REPO_PATH=/app/feature_store/feature_repo
      - CORS_ORIGINS=http://localhost:80,http://frontend:80
    volumes:
      - ./models/saved:/app/models/saved:ro      # read-only model weights
      - ./data/processed:/app/data/processed:ro  # read-only processed data
      - ./retrieval:/app/retrieval:ro             # FAISS index
      - ./mlops:/app/mlops                        # bandit state + A/B logs (rw)
      - ./feature_store:/app/feature_store:ro
      - ./logs:/app/logs                          # application logs (rw)
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s    # give 60s for models to load on startup
    networks:
      - ds19_net
    restart: unless-stopped

  # ── SERVICE 2: Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ds19_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    # appendonly yes → persist to disk (survives container restart)
    # maxmemory-policy allkeys-lru → evict LRU keys when full (safe for cache)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ds19_net
    restart: unless-stopped

  # ── SERVICE 3: MLflow ───────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: ds19_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
      - ./mlops/experiments:/mlops/experiments
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
                 --backend-store-uri sqlite:////mlops/experiments/mlflow.db
                 --default-artifact-root /mlflow/artifacts
                 --host 0.0.0.0
                 --port 5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ds19_net
    restart: unless-stopped

  # ── SERVICE 4: Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ds19_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"   # keep 15 days of metrics
      - "--web.enable-lifecycle"               # allows config reload via API
      - "--web.enable-admin-api"
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ds19_net
    restart: unless-stopped

  # ── SERVICE 5: Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.2
    container_name: ds19_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ds19admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # ── NEW: Slack webhook URL (read from .env file) ──────────────
      # Create a .env file: echo "SLACK_WEBHOOK_URL=https://hooks.slack.com/..." > .env
      # docker-compose automatically reads .env
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      # ── Grafana unified alerting ──────────────────────────────────
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false   # disable legacy alerting
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
  # ── SERVICE 6: Frontend (React built + served by Nginx) ─────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: ds19_frontend
    ports:
      - "5173:80"    # map internal Nginx :80 to host :5173
    networks:
      - ds19_net
    restart: unless-stopped

  # ── SERVICE 7: Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ds19_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    networks:
      - ds19_net
    restart: unless-stopped