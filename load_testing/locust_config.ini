[locust]
# Target host
host = http://localhost:8000

# Default headless settings
headless = false          # true = no web UI (for CI)
users = 50                # target concurrent users
spawn-rate = 5            # users spawned per second
run-time = 120s           # test duration

# Output
html = load_testing/reports/report.html
csv = load_testing/reports/results

# Logging
loglevel = INFO