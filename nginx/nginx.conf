# DS19 — Nginx Reverse Proxy
# Routes:
#   /            → Frontend (React SPA)
#   /recommend   → FastAPI backend
#   /feedback    → FastAPI backend
#   /health      → FastAPI backend
#   /metrics     → FastAPI backend (Prometheus scrape)
#   /ab          → FastAPI backend
#   /docs        → FastAPI Swagger UI

upstream fastapi_backend {
    server app:8000;
    keepalive 32;    # reuse connections (reduces latency)
}

upstream react_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    # Increase buffer sizes for large recommendation responses
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # Standard proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API routes → FastAPI ──────────────────────────────────────────
    location ~ ^/(recommend|feedback|health|ready|live|metrics|ab|docs|openapi.json) {
        proxy_pass http://fastapi_backend;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Pass through custom headers from FastAPI
        add_header X-Served-By "ds19-fastapi";
    }

    # ── Frontend → React SPA ──────────────────────────────────────────
    location / {
        proxy_pass http://react_frontend;
        proxy_read_timeout 10s;

        # Enable gzip for React assets
        gzip on;
        gzip_types text/html application/javascript text/css;
        gzip_min_length 1000;
    }

    # ── Grafana → directly accessible ────────────────────────────────
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
    }
}