name: DS19 — Weekly Model Retraining

on:
  schedule:
    # Every Sunday at 2:00 AM UTC
    # Cron syntax: minute hour day-of-month month day-of-week
    - cron: "0 2 * * 0"

  workflow_dispatch:
    # Allow manual triggering from GitHub Actions UI
    inputs:
      models:
        description: "Models to retrain (comma-separated: mf,sasrec,two_tower,lgbm)"
        required: false
        default: "mf,sasrec,two_tower,lgbm"
      force:
        description: "Force promotion even if quality gate fails?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dry_run:
        description: "Dry run (no promotion to production)?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Also trigger if retraining code itself changes
  push:
    branches:
      - main
    paths:
      - "mlops/retraining/**"
      - "models/training/**"


env:
  PYTHON_VERSION: "3.11"
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  FASTAPI_URL: ${{ secrets.FASTAPI_URL }}


jobs:
  # ── JOB 1: Setup + Data Validation ─────────────────────────────────
  setup_and_validate:
    name: "Setup + Data Check"
    runs-on: ubuntu-latest
    outputs:
      data_ok: ${{ steps.data_check.outputs.ok }}
      n_interactions: ${{ steps.data_check.outputs.n_interactions }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow structlog

      - name: Data Check
        id: data_check
        run: |
          python -c "
          import pandas as pd, sys
          from pathlib import Path

          df = pd.read_csv('data/processed/interactions.csv')
          n = len(df)
          print(f'Interactions: {n:,}')
          print(f'Users: {df[\"user_id\"].nunique():,}')
          print(f'Items: {df[\"item_id\"].nunique():,}')

          # Write GitHub Actions output
          with open('$GITHUB_OUTPUT', 'a') as f:
              f.write(f'ok=true\n')
              f.write(f'n_interactions={n}\n')

          if n < 100_000:
              print(f'ERROR: Only {n} interactions (need 100,000+)')
              sys.exit(1)
          else:
              print('Data check passed')
          "

      - name: Notify Slack — Retraining Started
        if: success()
        run: |
          python -c "
          import urllib.request, json, os, time
          url = os.environ.get('SLACK_WEBHOOK_URL', '')
          if not url:
              print('No SLACK_WEBHOOK_URL — skipping notification')
              exit(0)
          payload = json.dumps({
              'text': '🔄 *DS19 Retraining Started*\nModels: ${{ github.event.inputs.models || \"all\" }}\nTriggered by: ${{ github.event_name }}'
          }).encode()
          req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          "


  # ── JOB 2: Retrain All Models ─────────────────────────────────────
  retrain:
    name: "Retrain Models"
    runs-on: ubuntu-latest
    needs: setup_and_validate
    if: needs.setup_and_validate.outputs.data_ok == 'true'

    strategy:
      # Run model training in parallel (fail-fast: false = others keep running)
      fail-fast: false
      matrix:
        model:
          - mf
          - sasrec
          - two_tower
          - lgbm

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Retrain ${{ matrix.model }}
        run: |
          python models/training/train_${{ matrix.model }}.py
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          MLFLOW_EXPERIMENT_NAME: "ds19_retraining_${{ github.run_id }}"
          RETRAINING_MODE: "1"

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ matrix.model }}
          path: models/saved/${{ matrix.model }}_best*
          retention-days: 7


  # ── JOB 3: Validate + Promote ─────────────────────────────────────
  validate_and_promote:
    name: "Validate + Promote"
    runs-on: ubuntu-latest
    needs: retrain

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt mlflow structlog

      - name: Download All Model Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: model-*
          path: models/saved/
          merge-multiple: true

      - name: Run Full Retraining Pipeline (Validate + Promote)
        id: pipeline
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" == "true" ]; then
            FORCE_FLAG="--force"
          fi

          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          python mlops/retraining/retrain_pipeline.py \
            --run-id "github_${{ github.run_id }}" \
            $FORCE_FLAG $DRY_RUN_FLAG

      - name: Save Pipeline Results
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: mlops/retraining/run_*.json
          retention-days: 30

      - name: Comment on PR (if triggered by push)
        if: github.event_name == 'push' && github.event.head_commit
        run: |
          echo "Retraining pipeline completed. Results in artifacts."