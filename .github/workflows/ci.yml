name: DS19 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  MLFLOW_TRACKING_URI: "sqlite:///mlops/experiments/mlflow_ci.db"

jobs:

  # ──────────────────────────────────────────────────────────────────
  # JOB 1: LINT — Code style checks
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Code Style Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run flake8 (ignore line length + formatting issues)
        run: |
          flake8 mlops/ backend/ \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --exclude=__pycache__,.git,venv \
            --count --statistics
        continue-on-error: true  # Don't block on style warnings

      - name: Check Python syntax (hard fail)
        run: |
          find mlops/ backend/ tests/ -name "*.py" -exec python -m py_compile {} \;
          echo "✅ All Python files parse correctly"

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: UNIT TESTS — Bandits + A/B Testing (no GPU, no models)
  # ──────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Bandits + A/B)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov scipy numpy pandas
          # Install mlops package without heavy ML deps for unit tests
          pip install -e . --no-deps 2>/dev/null || echo "No setup.py, using sys.path"

      - name: Create test data directories
        run: |
          mkdir -p mlops/experiments mlops/ab_testing mlops/reports

      - name: Run bandit unit tests
        run: |
          pytest tests/test_bandits.py -v \
            --tb=short \
            --cov=mlops/bandits \
            --cov-report=term-missing

      - name: Run A/B testing unit tests
        run: |
          pytest tests/test_ab_testing.py -v \
            --tb=short \
            --cov=mlops/ab_testing \
            --cov-report=term-missing

      - name: Coverage gate — must be > 70%
        run: |
          pytest tests/test_bandits.py tests/test_ab_testing.py \
            --cov=mlops \
            --cov-fail-under=70 \
            -q

  # ──────────────────────────────────────────────────────────────────
  # JOB 3: MODEL METRIC GATE
  # Validates that saved evaluation metrics are above production thresholds.
  # This runs instead of re-training (CI doesn't have GPU or large data).
  # ──────────────────────────────────────────────────────────────────
  model-metric-gate:
    name: Model Metric Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install numpy pandas

      - name: Validate model metrics against thresholds
        run: |
          python - << 'EOF'
          import json, sys, pathlib

          # ── THRESHOLDS — adjust based on your actual model performance ──
          THRESHOLDS = {
              "mf":         {"ndcg@10":  0.50, "hit_rate@10": 0.65},
              "sasrec":     {"ndcg@10":  0.60, "hit_rate@10": 0.75},
              "two_tower":  {"recall@100": 0.80},
              "lgbm":       {"ndcg@10":  0.75, "hit_rate@10": 0.85},
          }

          EVAL_DIR = pathlib.Path("models/evaluation")
          if not EVAL_DIR.exists():
              print("⚠️  models/evaluation/ not found — skipping metric gate")
              print("   (This is expected in CI if models aren't committed)")
              sys.exit(0)

          all_passed = True
          for component, thresholds in THRESHOLDS.items():
              eval_file = EVAL_DIR / f"{component}_eval.json"
              if not eval_file.exists():
                  print(f"⚠️  {eval_file} not found — skipping {component}")
                  continue
              
              with open(eval_file) as f:
                  metrics = json.load(f)
              
              for metric_name, threshold in thresholds.items():
                  actual = metrics.get(metric_name, 0.0)
                  passed = actual >= threshold
                  icon   = "✅" if passed else "❌"
                  print(f"  {icon} {component:12s} {metric_name:20s}: "
                        f"{actual:.4f} (threshold: {threshold:.4f})")
                  if not passed:
                      all_passed = False
          
          if not all_passed:
              print("\n❌ MODEL METRIC GATE FAILED")
              print("   One or more models are below the required thresholds.")
              print("   Retrain and commit updated evaluation files.")
              sys.exit(1)
          else:
              print("\n✅ ALL MODEL METRICS PASS — Gate cleared")
          EOF

  # ──────────────────────────────────────────────────────────────────
  # JOB 4: DOCKER BUILD VALIDATION
  # Builds the Docker image to verify Dockerfile is valid.
  # Only runs on pushes to main (not PRs) to save CI minutes.
  # ──────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests, model-metric-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create required directories and stub files
        run: |
          # CI doesn't have real model files — create stubs to validate Dockerfile
          mkdir -p data/processed data/raw models/saved retrieval \
                   feature_store/feature_repo backend/app \
                   mlops/experiments mlops/ab_testing
          
          # Create minimal stub files
          echo '{"n_items":100,"n_users":100}' > data/processed/dataset_meta.json
          echo "movieId,title,genres" > data/raw/movies.csv
          echo "1,Toy Story (1995),Animation" >> data/raw/movies.csv
          
          # Create stub __init__.py files
          find backend mlops -type d -exec touch {}/__init__.py \;

      - name: Create stub requirements.txt (no GPU torch for faster CI)
        run: |
          cat > requirements.txt << 'EOF'
          numpy>=1.24.0
          pandas>=2.0.0
          scipy>=1.11.0
          fastapi>=0.104.0
          uvicorn[standard]>=0.24.0
          pydantic>=2.4.0
          mlflow>=2.8.0
          redis>=5.0.0
          EOF

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false         # Don't push — just validate the build
          tags: ds19-app:ci   # Tag for this CI run
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.run_id }}
            GIT_SHA=${{ github.sha }}

      - name: Verify image was built
        run: |
          docker images ds19-app:ci
          echo "✅ Docker image built successfully"