apiVersion: 1

policies:
  - orgId: 1
    receiver: "DS19 Slack Alerts"     # default receiver
    group_by: ["alertname", "severity"]
    group_wait: 30s                   # wait 30s before sending first alert
                                      # (allows related alerts to group)
    group_interval: 5m                # send updates every 5 minutes if still firing
    repeat_interval: 4h               # re-send if alert persists for 4+ hours

    routes:
      # Critical alerts: faster notification
      - receiver: "DS19 Slack Alerts"
        matchers:
          - severity = critical
        group_wait: 10s               # faster response for critical
        repeat_interval: 1h           # re-alert every hour if still critical

      # Warning alerts: standard timing
      - receiver: "DS19 Slack Alerts"
        matchers:
          - severity = warning