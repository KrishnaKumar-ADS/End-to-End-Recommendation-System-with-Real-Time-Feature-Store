apiVersion: 1

providers:
  - name: "DS19 Dashboards"
    orgId: 1
    folder: "DS19"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      # Path inside the Grafana container where dashboard JSON files live.
      # Mounted via docker-compose volume.
      path: /etc/grafana/dashboards